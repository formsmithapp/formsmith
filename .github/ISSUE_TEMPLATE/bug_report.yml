name: 🐛 Bug report
description: Something is broken or behaving incorrectly.
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A clear, reproducible report is the
        single most useful thing you can contribute. For usage questions, please use
        [Discussions](https://github.com/formsmithapp/formsmith/discussions) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact steps. If it involves a specific form or block, say which.
      placeholder: |
        1. Create a form with …
        2. Publish and open /f/:id …
        3. Submit …
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - Builder (creating/editing a form)
        - Respondent runtime (filling out a form)
        - AI follow-up / generation
        - Self-host / deployment (compose, migrations, config)
        - API / webhooks / export
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The image tag or commit you're on (see /api/health for the version).
      placeholder: 'e.g. v0.1.0'
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running Formsmith? Browser + OS if it's a UI bug.
      placeholder: |
        - Deploy: docker compose (default) / building from source / other
        - Host OS + arch: e.g. Ubuntu 24.04, arm64
        - Browser (if UI): e.g. Firefox 130
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Container logs or console errors. **Redact any secrets, keys, or personal data.**
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I removed any secrets, API keys, or personal data from logs above.
          required: true
