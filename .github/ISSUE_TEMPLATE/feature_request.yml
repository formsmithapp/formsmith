name: 💡 Feature request
description: Suggest a capability, block type, or improvement.
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Formsmith ships a deliberately small, correct core and grows it in the open. Before
        filing, it's worth skimming the [roadmap](https://github.com/formsmithapp/formsmith/blob/main/docs/roadmap.md) —
        your idea may already be planned, in which case a 👍 on the roadmap item or a
        comment about your use case is more useful than a new issue.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the feature. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Formsmith to do?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New block type
        - Logic / scoring
        - AI interviewer
        - Theming / design
        - Integrations (webhooks, n8n, Slack, …)
        - Self-host / operations
        - API / SDK / embed
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and the roadmap, and this isn't already covered.
          required: true
